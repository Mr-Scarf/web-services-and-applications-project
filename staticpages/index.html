<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pints App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Pints App 🍺</h1>

<!-- Guinness Surfer GIF -->
<div class="ad-container">
    <iframe width="560" height="315"
            src="https://www.youtube.com/embed/w9ogzVyTtcw"
            title="Guinness Surfer & Horses"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>
    <div class="ad-caption">Inspired by the iconic Guinness “Surfer & Horses” ad</div>
</div>



<h2>Add Pint</h2>
<div style="text-align:center;">
    Pub Name: <input type="text" id="pub_name">
    Price: <input type="number" id="price" step="0.01">
    <button onclick="createPint()">Add</button>
</div>

<h2>All Pints</h2>
<div style="text-align:center;">
    <button onclick="getAllPints()">Refresh</button>
</div>

<table id="pintTable">
    <tr>
        <th>ID</th>
        <th>Pub Name</th>
        <th>Price</th>
        <th>Created At</th>
        <th>Updated At</th>
        <th>Actions</th>
    </tr>
</table>

<script>
// GET all pints
function getAllPints() {
    fetch('/pints')
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById("pintTable");

            table.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Pub Name</th>
                    <th>Price</th>
                    <th>Created At</th>
                    <th>Updated At</th>
                    <th>Actions</th>
                </tr>
            `;

            data.forEach(pint => {
                const row = table.insertRow();

                row.insertCell(0).innerText = pint.id;

                row.insertCell(1).innerHTML =
                    `<input type="text" id="name_${pint.id}" value="${pint.pub_name}">`;

                row.insertCell(2).innerHTML =
                    `<input type="number" step="0.01" id="price_${pint.id}" value="${pint.price}">`;

                row.insertCell(3).innerText = new Date(pint.created_at).toLocaleString();

                row.insertCell(4).innerText = new Date(pint.created_at).toLocaleString();

                const actions = row.insertCell(5);

                const updateBtn = document.createElement("button");
                updateBtn.innerText = "Update";
                updateBtn.onclick = () => updatePint(pint.id);

                const deleteBtn = document.createElement("button");
                deleteBtn.innerText = "Delete";
                deleteBtn.onclick = () => deletePint(pint.id);

                actions.appendChild(updateBtn);
                actions.appendChild(deleteBtn);
            });
        });
}

// CREATE
function createPint() {
    const pub_name = document.getElementById("pub_name").value;
    const price = document.getElementById("price").value;

    fetch('/pints', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pub_name: pub_name, price: parseFloat(price) })
    })
    .then(res => res.json())
    .then(() => { clearForm(); getAllPints(); });
}

// UPDATE
function updatePint(id) {
    const pub_name = document.getElementById(`name_${id}`).value;
    const price = document.getElementById(`price_${id}`).value;

    fetch('/pints/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pub_name: pub_name, price: parseFloat(price) })
    })
    .then(res => res.json())
    .then(() => getAllPints());
}

// DELETE
function deletePint(id) {
    fetch('/pints/' + id, { method: 'DELETE' })
        .then(res => res.json())
        .then(() => getAllPints());
}

// Clear form
function clearForm() {
    document.getElementById("pub_name").value = "";
    document.getElementById("price").value = "";
}

// Load on startup
window.onload = getAllPints;
</script>

</body>
</html>
